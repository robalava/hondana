<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>馬蹄通り書店</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --wood:       #9a8a68;
  --wood2:      #b8a88a;
  --paper:      #f0ebe0;
  --paper2:     #e2dbd0;
  --ink:        #261c10;
  --ink2:       #5a4430;
  --ink3:       #8a7a68;
  --red:        #7a3828;
  --gold:       #9a8a68;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  background: #d8d2c6;
}

/* ヘッダー */
.site-header {
  background: linear-gradient(180deg, #8a7858 0%, #a89878 40%, #b8a88a 100%);
  border-bottom: 1px solid #7a6848;
  padding: 2rem 1.5rem 1.6rem;
  text-align: center;
  position: relative;
}
.site-header::before, .site-header::after {
  content: '';
  display: block;
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  margin: 0 auto;
}
.site-header::before { margin-bottom: 1rem; }
.site-header::after  { margin-top: 1rem; }
.site-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 2rem;
  font-weight: 700;
  color: #f4ece0;
  letter-spacing: .15em;
  margin-bottom: .4rem;
  text-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.site-subtitle {
  font-size: .7rem;
  color: rgba(244,236,224,.65);
  letter-spacing: .25em;
  font-weight: 300;
  text-transform: uppercase;
}
.header-divider { display: none; }

/* フィルターバー */
.filter-bar {
  background: #ccc4b4;
  padding: .35rem .8rem;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(154,138,104,.35);
}
.filter-bar-inner {
  display: flex;
  gap: .3rem;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 560px;
}
.filter-label { display: none; }
.filter-btns { display: flex; gap: .3rem; flex-wrap: wrap; justify-content: center; }
.filter-btn {
  background: transparent;
  border: 1px solid rgba(154,138,104,.6);
  border-radius: 3px;
  padding: .18rem .5rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .65rem;
  color: var(--ink2);
  cursor: pointer;
  transition: all .18s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--wood2);
  border-color: var(--wood);
  color: var(--ink);
}

/* 本棚コンテナ */
.shelves-wrap {
  flex: 1;
  padding: 1rem 1rem 3rem;
  width: 100%;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #b8b0a0;
}

/* 棚 */
.shelf {
  margin-bottom: 2rem;
  position: relative;
  width: 100%;
}

/* 本の並び */
.shelf-books {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  padding: .5rem .4rem 0;
  min-height: 220px;
  width: 100%;
  box-sizing: border-box;
  background: linear-gradient(180deg,
    rgba(0,0,0,0) 0%, rgba(0,0,0,0) 55%,
    rgba(0,0,0,0.18) 85%, rgba(0,0,0,0.28) 100%
  );
  border-radius: 3px 3px 0 0;
  flex-wrap: nowrap;
  position: relative;
}
.shelf-books::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 18px;
  background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.22) 100%);
  pointer-events: none;
}

/* 棚板 */
.shelf-board {
  height: 20px;
  width: 100%;
  background: linear-gradient(180deg, #c0aa88 0%, #a08868 25%, #886848 60%, #604830 100%);
  border-radius: 1px;
  box-shadow: 0 8px 20px rgba(38,28,16,.45), 0 3px 6px rgba(38,28,16,.3), inset 0 1px 0 rgba(255,255,255,.2);
  position: relative;
}
.shelf-board::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.20) 50%, rgba(255,255,255,.04));
}
.shelf-board::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 6px;
  background: rgba(0,0,0,.15);
}

/* 本 */
.book-item {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), filter .25s;
  transform-origin: bottom center;
  filter: brightness(.95);
}
.book-item:hover {
  transform: translateY(-14px);
  filter: brightness(1.05);
  z-index: 10;
  position: relative;
}

/* 背表紙 — 幅はJS側でinlineで指定するのでここでは指定しない */
.book-spine {
  flex-shrink: 0;
  border-radius: 2px 3px 3px 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  writing-mode: vertical-rl;
  font-family: 'Shippori Mincho', serif;
  font-size: .75rem;
  font-weight: 600;
  color: rgba(255,255,255,.92);
  padding: 2rem .2rem;
  letter-spacing: .16em;
  line-height: 1.4;
  overflow: hidden;
  box-shadow: inset -4px 0 8px rgba(0,0,0,.3), inset 3px 0 4px rgba(255,255,255,.07), 3px 0 8px rgba(0,0,0,.25);
  position: relative;
}
.book-spine::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(90deg, rgba(210,180,100,.18) 0%, rgba(210,180,100,.05) 4px, transparent 4px),
    linear-gradient(180deg,
      rgba(0,0,0,.0)          0%,
      rgba(210,175,85,.55)    8%,
      rgba(235,200,110,.85)   8.5%,
      rgba(210,175,85,.55)    9%,
      rgba(0,0,0,.0)          9.5%,
      rgba(200,165,75,.4)     11%,
      rgba(200,165,75,.4)     11.5%,
      rgba(0,0,0,.0)          12%,
      rgba(0,0,0,.0)          88%,
      rgba(200,165,75,.4)     88.5%,
      rgba(200,165,75,.4)     89%,
      rgba(0,0,0,.0)          89.5%,
      rgba(210,175,85,.55)    91%,
      rgba(235,200,110,.85)   91.5%,
      rgba(210,175,85,.55)    92%,
      rgba(0,0,0,.0)          100%
    );
  pointer-events: none;
}
.book-spine::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(180deg, rgba(255,255,255,.0) 0px, rgba(255,255,255,.0) 3px, rgba(255,255,255,.015) 3px, rgba(255,255,255,.015) 4px);
  pointer-events: none;
}

/* 本の色 */
.bc-0 { background: linear-gradient(160deg, #6a7a5a, #4e5e44); }
.bc-1 { background: linear-gradient(160deg, #7a6050, #5e4438); }
.bc-2 { background: linear-gradient(160deg, #506070, #384858); }
.bc-3 { background: linear-gradient(160deg, #685870, #4e4056); }
.bc-4 { background: linear-gradient(160deg, #706848, #564e34); }
.bc-5 { background: linear-gradient(160deg, #506860, #384e48); }
.bc-6 { background: linear-gradient(160deg, #785850, #5c403a); }
.bc-7 { background: linear-gradient(160deg, #586858, #405040); }

/* モーダル */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(20,14,8,.75);
  backdrop-filter: blur(3px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--paper);
  border-radius: 10px;
  max-width: 460px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
  animation: modal-in .22s cubic-bezier(.34,1.2,.64,1);
}
@keyframes modal-in {
  from { opacity:0; transform: translateY(24px) scale(.96); }
  to   { opacity:1; transform: none; }
}
.modal-top {
  background: linear-gradient(160deg, #c4b49a 0%, #a89878 100%);
  padding: 1.4rem;
  display: flex;
  gap: 1.2rem;
  align-items: flex-start;
  border-radius: 10px 10px 0 0;
  position: relative;
  overflow: hidden;
}
.modal-top::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 60%);
  pointer-events: none;
}
.modal-cover {
  width: 90px;
  min-width: 90px;
  max-height: 160px;
  height: auto;
  object-fit: contain;
  border-radius: 2px 5px 5px 2px;
  box-shadow: 4px 6px 16px rgba(0,0,0,.45);
}
.modal-cover-ph {
  width: 78px;
  min-width: 78px;
  height: 112px;
  background: rgba(0,0,0,.15);
  border-radius: 2px 5px 5px 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .62rem;
  color: rgba(255,255,255,.5);
}
.modal-header-info { flex: 1; padding-top: .2rem; }
.modal-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: #faf4e8;
  line-height: 1.6;
  margin-bottom: .4rem;
  text-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.modal-author { font-size: .78rem; color: rgba(250,244,232,.78); margin-bottom: .15rem; }
.modal-pub    { font-size: .7rem;  color: rgba(250,244,232,.55); }
.modal-genre-tag {
  display: inline-block;
  margin-top: .6rem;
  padding: .2rem .65rem;
  background: rgba(0,0,0,.18);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px;
  font-size: .65rem;
  color: rgba(250,244,232,.75);
}
.modal-body { padding: 1.4rem 1.6rem 1.2rem; }
.modal-from {
  font-size: .72rem;
  color: var(--ink3);
  margin-bottom: .9rem;
  display: flex;
  align-items: center;
  gap: .4rem;
  padding-bottom: .8rem;
  border-bottom: 1px solid rgba(154,138,104,.2);
}
.from-name {
  font-family: 'Shippori Mincho', serif;
  font-weight: 600;
  color: var(--ink2);
  font-size: .88rem;
}
.modal-comment {
  font-size: .88rem;
  line-height: 2;
  color: var(--ink);
  border-left: 2px solid var(--gold);
  padding: .7rem 1rem;
  background: rgba(154,138,104,.08);
  border-radius: 0 5px 5px 0;
}
.modal-close {
  display: block;
  width: 100%;
  padding: .85rem;
  border: none;
  border-top: 1px solid rgba(154,138,104,.2);
  background: transparent;
  font-family: 'Shippori Mincho', serif;
  font-size: .8rem;
  color: var(--ink3);
  cursor: pointer;
  transition: background .18s, color .18s;
  border-radius: 0 0 10px 10px;
  letter-spacing: .1em;
}
.modal-close:hover { background: var(--paper2); color: var(--ink2); }

/* 空の状態 */
.empty-shelf { text-align: center; padding: 4rem 2rem; color: var(--ink3); opacity: .7; }
.empty-shelf-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-shelf-text { font-family: 'Shippori Mincho', serif; font-size: 1rem; letter-spacing: .1em; }

/* フッター */
.site-footer {
  background: #b8a88a;
  border-top: 1px solid #9a8a68;
  padding: .8rem 1rem;
  text-align: center;
  position: sticky;
  bottom: 0;
  z-index: 50;
}
.footer-btns { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; }
.footer-add-btn {
  display: inline-block;
  padding: .5rem 1.2rem;
  background: var(--ink2);
  color: var(--paper);
  border: none;
  border-radius: 4px;
  font-family: 'Shippori Mincho', serif;
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .08em;
  cursor: pointer;
  text-decoration: none;
  transition: background .2s;
}
.footer-add-btn:hover { background: var(--ink); }
.footer-manage-btn {
  display: inline-block;
  padding: .5rem 1.2rem;
  background: transparent;
  color: var(--ink2);
  border: 1px solid var(--ink3);
  border-radius: 4px;
  font-family: 'Shippori Mincho', serif;
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .08em;
  cursor: pointer;
  text-decoration: none;
  transition: all .2s;
}
.footer-manage-btn:hover { background: rgba(38,28,16,.08); }
.footer-note { margin-top: .4rem; font-size: .65rem; color: var(--ink3); }
.loading {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--ink2);
  font-family: 'Shippori Mincho', serif;
  letter-spacing: .1em;
  opacity: .6;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">馬 蹄 通 り 書 店</div>
  <div class="site-subtitle">the things that shape your world</div>
  <div class="header-divider"></div>
</header>

<div class="filter-bar">
  <div class="filter-bar-inner">
    <span class="filter-label">絞り込み：</span>
    <div class="filter-btns" id="filter-btns">
      <button class="filter-btn active" data-genre="">すべて</button>
    </div>
  </div>
</div>

<div class="shelves-wrap">
  <div class="loading" id="loading">棚を整えています…</div>
  <div id="shelf-container" style="display:none;width:100%;display:none;"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-top" id="modal-top"></div>
    <div class="modal-body" id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">とじる</button>
  </div>
</div>

<footer class="site-footer">
  <div class="footer-btns">
    <a id="form-link" href="#" class="footer-add-btn">＋ 棚に本を並べる</a>
    <a id="manage-link" href="#" class="footer-manage-btn">📋 自分の棚を見る</a>
  </div>
  <div class="footer-note">書店員IDがあれば登録・棚を直す・棚から外すができます</div>
</footer>

<script>
var allBooks = [];
var currentGenre = "";

// PC/スマホ完全分離
var isMobile = window.innerWidth <= 500;
var BOOK_W   = isMobile ? 52 : 68;   // 背表紙幅
var GAP      = 3;                     // 本と本の隙間
var SHELF_SIZE = isMobile ? 6 : 7;   // 1棚の冊数

// 両方とも棚板幅を本がぴったり収まる幅に固定・中央揃え
var SHELF_FIXED_W = SHELF_SIZE * BOOK_W + (SHELF_SIZE - 1) * GAP + 8;

var SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQh3nVGjVrSxeAV3jBtE0VjfwDwkV7W1XRtnGoO27fThwIzQrvmproeNQVt-uQYpwEzcluFWXDHo_CP/pub?output=csv';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbz3GfkpeUbM_SCMuV7jBh1H65AXtr8z1mu7LHq4J1Lm8glMvQARfTkrRSZDe686jGrX/exec';

document.getElementById('form-link').href   = GAS_URL + '?page=form';
document.getElementById('manage-link').href = './manage.html';

var SPINE_COLORS = ['bc-0','bc-1','bc-2','bc-3','bc-4','bc-5','bc-6','bc-7'];
function spineColor(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xffff;
  return SPINE_COLORS[h % SPINE_COLORS.length];
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// CSV パース
function parseCSV(text) {
  var lines = text.split('\n');
  if (lines.length < 2) return [];
  var books = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = splitCSVLine(lines[i]);
    if (!cols[0]) continue;
    books.push({
      id: cols[0]||'', timestamp: cols[1]||'', nickname: cols[3]||'',
      isbn: cols[4]||'', title: cols[5]||'', author: cols[6]||'',
      publisher: cols[7]||'', cover: cols[8]||'', comment: cols[9]||'', genre: cols[10]||''
    });
  }
  books.reverse();
  return books;
}
function splitCSVLine(line) {
  var cols=[], cur='', inQ=false;
  for (var i=0;i<line.length;i++) {
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  cols.push(cur.trim());
  return cols;
}

// データ読み込み
fetch(GAS_URL + '?page=api&action=books', { redirect: 'follow' })
  .then(function(r){ return r.text(); })
  .then(function(text){
    var json = text.trim();
    if (json.indexOf('_booksCallback(') === 0) json = json.slice(15, -1);
    var res = JSON.parse(json);
    document.getElementById("loading").style.display = "none";
    document.getElementById("shelf-container").style.display = "block";
    if (!res || res.status !== "ok") { renderEmpty("データの読み込みに失敗しました"); return; }
    allBooks = res.books || [];
    if (!allBooks.length) { renderEmpty("まだ棚が空です。最初の一冊を並べてみましょう。"); return; }
    buildFilters();
    renderShelf(allBooks);
  })
  .catch(function(err){
    document.getElementById("loading").style.display = "none";
    document.getElementById("shelf-container").style.display = "block";
    renderEmpty("読み込みエラー: " + err.message);
  });

function buildFilters() {
  var genres = {};
  allBooks.forEach(function(b){ if (b.genre) genres[b.genre] = true; });
  var bar = document.getElementById("filter-btns");
  Object.keys(genres).sort().forEach(function(g){
    var btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.dataset.genre = g;
    btn.textContent = g;
    btn.addEventListener("click", function(){ filterBy(g, btn); });
    bar.appendChild(btn);
  });
  bar.querySelector('[data-genre=""]').addEventListener("click", function(){ filterBy("", this); });
}

function filterBy(genre, el) {
  currentGenre = genre;
  document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
  el.classList.add("active");
  renderShelf(genre ? allBooks.filter(function(b){ return b.genre === genre; }) : allBooks);
}

function renderShelf(books) {
  var container = document.getElementById("shelf-container");
  if (!books.length) { renderEmpty(); return; }
  window._displayedBooks = books;

  var html = "";
  for (var i = 0; i < books.length; i += SHELF_SIZE) {
    var chunk = books.slice(i, i + SHELF_SIZE);
    // 棚板幅：固定（PC・スマホ共通）
    var shelfW = 'width:' + SHELF_FIXED_W + 'px';
    html += '<div class="shelf" style="' + shelfW + '">';
    html += '<div class="shelf-books">';
    chunk.forEach(function(b, idx){
      var globalIdx = i + idx;
      var h = 0;
      for (var ci = 0; ci < b.title.length; ci++) h = (h * 31 + b.title.charCodeAt(ci)) & 0xffff;
      var spineH = 160 + (h % 50); // 160〜209px
      // 背表紙幅はBOOK_Wをinlineで指定（CSSの固定値に依存しない）
      html += '<div class="book-item" onclick="openModal(' + globalIdx + ')">';
      html += '<div class="book-spine ' + spineColor(b.title) + '" style="width:' + BOOK_W + 'px;height:' + spineH + 'px">' + esc(b.title) + '</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="shelf-board" style="' + shelfW + '"></div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderEmpty(msg) {
  document.getElementById("shelf-container").innerHTML =
    '<div class="empty-shelf"><div class="empty-shelf-icon">📚</div>' +
    '<div class="empty-shelf-text">' + (msg||"まだ棚が空です。最初の一冊を並べてみましょう。") + '</div></div>';
}

function openModal(idx) {
  var b = window._displayedBooks[idx];
  if (!b) return;
  var top = document.getElementById("modal-top");
  var body = document.getElementById("modal-body");
  var rakutenUrl = b.isbn
    ? "https://books.rakuten.co.jp/search?sty=1&g=001&sitem=" + encodeURIComponent(b.isbn)
    : "https://books.rakuten.co.jp/search?sty=1&g=001&k=" + encodeURIComponent(b.title);
  var coverHtml = b.cover
    ? '<a href="' + rakutenUrl + '" target="_blank"><img class="modal-cover" src="' + esc(b.cover) + '" alt="表紙"></a>'
    : '<div class="modal-cover-ph">表紙なし</div>';
  top.innerHTML = coverHtml +
    '<div class="modal-header-info">' +
      '<a href="' + rakutenUrl + '" target="_blank" style="text-decoration:none;color:inherit;">' +
        '<div class="modal-title">' + esc(b.title) + ' <span style="font-size:.65rem;opacity:.6;">↗</span></div>' +
      '</a>' +
      '<div class="modal-author">' + esc(b.author) + '</div>' +
      '<div class="modal-pub">' + esc(b.publisher) + '</div>' +
      (b.genre ? '<span class="modal-genre-tag">' + esc(b.genre) + '</span>' : '') +
    '</div>';
  body.innerHTML =
    '<div class="modal-from">棚主：<span class="from-name">' + esc(b.nickname) + '</span> さんの推薦</div>' +
    '<div class="modal-comment">' + esc(b.comment).replace(/\n/g,'<br>') + '</div>' +
    '<a href="' + rakutenUrl + '" target="_blank" style="display:block;margin-top:1rem;text-align:center;font-size:.75rem;color:var(--gold);text-decoration:underline;">楽天ブックスでこの本を探す ↗</a>';
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(e) {
  if (!e || e.target === document.getElementById("modal-overlay") || (e.currentTarget && e.currentTarget.classList.contains("modal-close"))) {
    document.getElementById("modal-overlay").classList.remove("open");
  }
}
</script>
</body>
</html>
